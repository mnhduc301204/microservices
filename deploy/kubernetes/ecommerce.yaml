apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  Authentication__SigningKey: change-me-with-secret-manager
  InternalApi__ApiKey: change-me-with-secret-manager
  PaymentProvider__WebhookSecret: change-me-with-secret-manager
  ConnectionStrings__catalogdb: Host=postgres;Database=catalogdb;Username=ecommerce;Password=change-me
  ConnectionStrings__inventorydb: Host=postgres;Database=inventorydb;Username=ecommerce;Password=change-me
  ConnectionStrings__orderingdb: Host=postgres;Database=orderingdb;Username=ecommerce;Password=change-me
  ConnectionStrings__paymentdb: Host=postgres;Database=paymentdb;Username=ecommerce;Password=change-me
  ConnectionStrings__notificationdb: Host=postgres;Database=notificationdb;Username=ecommerce;Password=change-me
  ConnectionStrings__basket-redis: redis:6379
  ConnectionStrings__kafka: kafka:9092
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  ASPNETCORE_ENVIRONMENT: Production
  Authentication__Issuer: ecommerce
  Authentication__Audience: ecommerce-api
  InternalApi__RequireInbound: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ecommerce-default-limits
  namespace: ecommerce
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-by-default
  namespace: ecommerce
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: ecommerce
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - catalog-api
          - inventory-api
          - basket-api
          - ordering-api
          - payment-api
          - notification-api
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8080
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-egress
  namespace: ecommerce
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 4317
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  policyTypes:
    - Egress
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ecommerce/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: InternalApi__RequireInbound
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ecommerce
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: ecommerce/catalog:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets
          readinessProbe: { httpGet: { path: /health, port: 8080 } }
          livenessProbe: { httpGet: { path: /alive, port: 8080 } }
---
apiVersion: v1
